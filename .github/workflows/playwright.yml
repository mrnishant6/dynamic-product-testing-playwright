name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    name: 🎭 Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run Playwright tests
        id: playwright-run
        run: npx playwright test
        env:
          CI: true

      # ── Step Summary — visible directly in the Actions UI, no download needed
      - name: 📝 Write test summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "test-results/results.json" ]; then
            python3 -c "
          import json, sys

          with open('test-results/results.json') as f:
              data = json.load(f)

          total = passed = failed = skipped = flaky = 0

          def walk(suite):
              global total, passed, failed, skipped, flaky
              for s in suite.get('suites', []):
                  walk(s)
              for spec in suite.get('specs', []):
                  for test in spec.get('tests', []):
                      total += 1
                      status = test.get('status', '')
                      retries = len(test.get('results', []))
                      if status == 'expected':
                          if retries > 1:
                              flaky += 1
                          else:
                              passed += 1
                      elif status == 'unexpected':
                          failed += 1
                      elif status == 'skipped':
                          skipped += 1

          for suite in data.get('suites', []):
              walk(suite)

          print(f'| ✅ Passed  | {passed} |')
          print(f'| ❌ Failed  | {failed} |')
          print(f'| 🔄 Flaky   | {flaky}  |')
          print(f'| ⏭️ Skipped | {skipped} |')
          print(f'| 📊 Total   | {total}  |')
          " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ results.json not found — tests may not have run" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Playwright HTML report — download from Actions artifacts
      - name: 📤 Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── Raw test artifacts (screenshots, videos, traces on failure)
      - name: 📤 Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: test-results/
          retention-days: 7
